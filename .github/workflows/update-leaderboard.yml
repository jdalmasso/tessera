name: Update Leaderboard

on:
  schedule:
    - cron: "0 10 * * *"  # 6:00 AM ET (UTC-4) / shifts to 0 11 during EST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: db/tessera.db
          key: tessera-db-${{ github.run_id }}
          restore-keys: |
            tessera-db-

      - name: Run pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python -m surfaces.skills_leaderboard.pipeline

      - name: Build site
        run: python -m surfaces.skills_leaderboard.build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
