name: Update Leaderboard

on:
  schedule:
    - cron: "0 10 * * *"  # 6:00 AM ET (UTC-4) / shifts to 0 11 during EST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python -m surfaces.skills_leaderboard.pipeline
      - name: Build site
        run: python -m surfaces.skills_leaderboard.build
      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: surfaces/skills_leaderboard/site/

  deploy:
    needs: update
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
