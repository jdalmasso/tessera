name: Update Leaderboard

on:
  schedule:
    - cron: "0 10 * * *"  # 6:00 AM ET (UTC-4) / shifts to 0 11 during EST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Get date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: db/tessera.db
          key: tessera-db-${{ steps.date.outputs.date }}
          restore-keys: |
            tessera-db-

      - name: Validate cached database
        run: |
          if [ -f db/tessera.db ]; then
            python -c "
          import sqlite3, sys
          try:
              conn = sqlite3.connect('db/tessera.db')
              result = conn.execute('PRAGMA integrity_check').fetchone()
              conn.close()
              if result[0] != 'ok':
                  print(f'DB integrity check failed: {result[0]}', file=sys.stderr)
                  sys.exit(1)
          except Exception as e:
              print(f'DB validation error: {e}', file=sys.stderr)
              sys.exit(1)
          " || rm -f db/tessera.db && echo "Removed corrupt database, starting fresh"
          fi

      - name: Run pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python -m surfaces.skills_leaderboard.pipeline

      - name: Build site
        run: python -m surfaces.skills_leaderboard.build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: "*.log"
          if-no-files-found: ignore
          retention-days: 30
