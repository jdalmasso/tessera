# Discovery configuration: search queries, caps, and filtering rules.

max_repos: 6000  # safety ceiling; GitHub Search API yields ~900 results per shard

# Single high-precision query sharded by pushed-date to bypass GitHub code
# search's ~900-result-per-query ceiling. Each shard appends a pushed:RANGE
# filter so every date window gets its own ~900-result window.
#
# Why filename:SKILL.md path:.claude/skills?
#   - Canonical Claude Code skill path — lowest false-positive rate
#   - Broad filename:SKILL.md captures other ecosystems (OpenClaw, ClawdBot)
#   - Topic searches (topic:claude-skill) are a small subset of path results
#
discovery:
  query: "filename:SKILL.md path:.claude/skills"
  shards:
    - pushed: ">2025-06-01"
    - pushed: "2025-01-01..2025-05-31"
    - pushed: "2024-01-01..2024-12-31"
    - pushed: "2023-01-01..2023-12-31"
    - pushed: "<2023-01-01"

# Filtering: a repo/skill is included only if ALL conditions pass.
filters:
  exclude_forks: true      # all forks excluded in v0.1
  exclude_archived: true
  min_skill_md_chars: 100
  require_frontmatter: true
  require_name_or_description: true  # frontmatter must have at least one of these

# Monorepo handling
monorepo:
  collection_threshold: 10  # repos with ≥ this many SKILL.md files are "collections"
  adoption_dampening: true  # dampen repo-level signals: log(stars) / log(skill_count + 1)

# API behaviour
api:
  per_page: 100           # results per page for search endpoints
  timeout_seconds: 30     # per-request timeout
  max_retries: 3          # exponential backoff retries on transient failures
  progress_log_interval: 100  # log progress every N repos
