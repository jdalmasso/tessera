# Category definitions for the Skills Leaderboard.
# Each skill is assigned to exactly one category via a cascade (see docs/categorization.md).
# Keyword matching is case-insensitive and applied to: skill name, SKILL.md description,
# GitHub topics, directory path, and README (first 500 chars).

